openapi: 3.1.0
info:
  title: OSS Risk Radar Public API
  version: 0.1.0
  description: REST API for dependency risk triage analyses.
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      operationId: getHealth
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /ready:
    get:
      operationId: getReady
      responses:
        "200":
          description: Readiness status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
  /api/v1/uploads:
    post:
      operationId: createUpload
      summary: Register an uploaded dependency artifact
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Upload stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUploadResponse"
  /api/v1/analyses:
    get:
      operationId: listAnalyses
      responses:
        "200":
          description: Analyses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAnalysesResponse"
    post:
      operationId: createAnalysis
      summary: Create an analysis from demo input, repo URL, or uploaded artifact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnalysisRequest"
            examples:
              demo:
                value:
                  submission:
                    kind: demo
                    artifactName: 'Demo: Node Web Application'
                    demoProfile: node-web
                    includeTransitiveDependencies: true
              repo:
                value:
                  submission:
                    kind: repository_url
                    repositoryUrl: https://github.com/vercel/next.js
                    includeTransitiveDependencies: true
              upload:
                value:
                  submission:
                    kind: upload
                    uploadId: upl_demo_01
                    artifactName: package-lock.json
                    includeTransitiveDependencies: true
      responses:
        "201":
          description: Analysis created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAnalysisResponse"
  /api/v1/analyses/{analysisId}:
    get:
      operationId: getAnalysis
      parameters:
        - $ref: "#/components/parameters/AnalysisId"
      responses:
        "200":
          description: Analysis summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResponse"
        "404":
          description: Analysis not found
  /api/v1/analyses/{analysisId}/dependencies:
    get:
      operationId: getAnalysisDependencies
      parameters:
        - $ref: "#/components/parameters/AnalysisId"
      responses:
        "200":
          description: Analysis dependencies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DependencyListResponse"
  /api/v1/analyses/{analysisId}/graph:
    get:
      operationId: getAnalysisDependencyGraph
      parameters:
        - $ref: "#/components/parameters/AnalysisId"
      responses:
        "200":
          description: Dependency graph
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDependencyGraphResponse"
  /api/v1/dependencies/{dependencyId}:
    get:
      operationId: getDependency
      parameters:
        - $ref: "#/components/parameters/DependencyId"
      responses:
        "200":
          description: Dependency detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DependencyDetailResponse"
        "404":
          description: Dependency not found
  /api/v1/jobs/{jobId}:
    get:
      operationId: getJob
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
  /api/v1/training/dataset:
    get:
      operationId: getTrainingDataset
      summary: Read the staged training dataset summary
      responses:
        "200":
          description: Training dataset summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingDatasetResponse"
  /api/v1/training/effects:
    get:
      operationId: getTrainingEffects
      summary: Read training signal effect sizes
      responses:
        "200":
          description: Training signal effect sizes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingEffectsResponse"
  /api/v1/training/runs:
    get:
      operationId: listTrainingRuns
      summary: List staged model artifacts
      responses:
        "200":
          description: Staged model artifact history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingRunListResponse"
  /api/v1/training/runs/latest:
    get:
      operationId: getLatestTrainingRun
      summary: Read the latest staged model artifact
      responses:
        "200":
          description: Latest staged model artifact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LatestTrainingRunResponse"
components:
  parameters:
    AnalysisId:
      name: analysisId
      in: path
      required: true
      schema:
        type: string
    DependencyId:
      name: dependencyId
      in: path
      required: true
      schema:
        type: string
    JobId:
      name: jobId
      in: path
      required: true
      schema:
        type: string
  schemas:
    HealthResponse:
      type: object
      required: [status, service, timestamp]
      properties:
        status:
          type: string
          enum: [ok]
        service:
          type: string
        timestamp:
          type: string
          format: date-time
    ReadyResponse:
      type: object
      required: [status, service, dependencies]
      properties:
        status:
          type: string
          enum: [ready]
        service:
          type: string
        dependencies:
          type: object
          additionalProperties:
            type: string
    UploadArtifact:
      type: object
      required: [id, fileName, contentType, sizeBytes, uploadedAt, status]
      properties:
        id:
          type: string
        fileName:
          type: string
        contentType:
          type: string
        sizeBytes:
          type: integer
        uploadedAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [received, parsed, failed]
        parseError:
          type: string
        analysisId:
          type: string
    CreateUploadResponse:
      type: object
      required: [upload]
      properties:
        upload:
          $ref: "#/components/schemas/UploadArtifact"
    CreateAnalysisRequest:
      type: object
      required: [submission]
      properties:
        submission:
          $ref: "#/components/schemas/AnalysisSubmission"
        force:
          type: boolean
          default: false
    AnalysisSubmission:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [demo, repository_url, upload]
        repositoryUrl:
          type: string
          format: uri
        artifactName:
          type: string
        uploadId:
          type: string
        modelName:
          type: string
        includeTransitiveDependencies:
          type: boolean
        demoProfile:
          type: string
    CreateAnalysisResponse:
      type: object
      required: [analysis, job, reusedExistingAnalysis]
      properties:
        analysis:
          $ref: "#/components/schemas/Analysis"
        job:
          $ref: "#/components/schemas/Job"
        reusedExistingAnalysis:
          type: boolean
        reusedFromAnalysisId:
          type: string
    ListAnalysesResponse:
      type: object
      required: [analyses]
      properties:
        analyses:
          type: array
          items:
            $ref: "#/components/schemas/Analysis"
    AnalysisResponse:
      type: object
      required: [analysis]
      properties:
        analysis:
          $ref: "#/components/schemas/Analysis"
    Analysis:
      type: object
      required: [id, status, createdAt, updatedAt, submission, summary, dependencies]
      properties:
        id:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        submission:
          $ref: "#/components/schemas/AnalysisSubmission"
        summary:
          $ref: "#/components/schemas/AnalysisSummary"
        dependencies:
          type: array
          items:
            $ref: "#/components/schemas/Dependency"
        dependencyEdges:
          type: array
          items:
            $ref: "#/components/schemas/DependencyEdge"
        uploads:
          type: array
          items:
            $ref: "#/components/schemas/UploadArtifact"
        methodologyVersion:
          type: string
        latestJobId:
          type: string
    AnalysisSummary:
      type: object
      required: [dependencyCount, highRiskCount, mappedRepositoryCount, scoreAvailabilityCount, riskDistribution, ecosystemBreakdown, scoringMethods]
      properties:
        dependencyCount:
          type: integer
        highRiskCount:
          type: integer
        mappedRepositoryCount:
          type: integer
        scoreAvailabilityCount:
          type: integer
        riskDistribution:
          type: object
          additionalProperties:
            type: integer
        ecosystemBreakdown:
          type: object
          additionalProperties:
            type: integer
        scoringMethods:
          type: array
          items:
            type: object
            additionalProperties: true
    DependencyListResponse:
      type: object
      required: [dependencies]
      properties:
        dependencies:
          type: array
          items:
            $ref: "#/components/schemas/Dependency"
    DependencyDetailResponse:
      type: object
      required: [dependency]
      properties:
        dependency:
          $ref: "#/components/schemas/Dependency"
    GetDependencyGraphResponse:
      type: object
      required: [graph]
      properties:
        graph:
          $ref: "#/components/schemas/DependencyGraph"
    DependencyGraph:
      type: object
      required: [analysisId, nodes, edges]
      properties:
        analysisId:
          type: string
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/Dependency"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/DependencyEdge"
    DependencyEdge:
      type: object
      required: [from, to, kind]
      properties:
        from:
          type: string
        to:
          type: string
        kind:
          type: string
    Dependency:
      type: object
      required: [id, analysisId, packageName, packageVersion, ecosystem, direct, dependencyPath, rawSignalsAvailable]
      properties:
        id: { type: string }
        analysisId: { type: string }
        packageName: { type: string }
        packageVersion: { type: string }
        ecosystem: { type: string }
        direct: { type: boolean }
        repository:
          $ref: "#/components/schemas/RepositorySnapshot"
        scorecard:
          type: object
          additionalProperties: true
        historicalFeatures:
          type: object
          additionalProperties:
            type: number
        featureRegime: { type: string }
        historicalCacheHit: { type: boolean }
        riskProfile:
          $ref: "#/components/schemas/RiskProfile"
        dependencyPath:
          type: array
          items: { type: string }
        rawSignalsAvailable: { type: boolean }
        rawSignals:
          type: array
          items:
            $ref: "#/components/schemas/RawSignalItem"
        parsedFromUploadId: { type: string }
    RepositorySnapshot:
      type: object
      required: [fullName, url, defaultBranch, archived, stars, forks, openIssues, lastPushAt]
      properties:
        fullName: { type: string }
        url: { type: string, format: uri }
        defaultBranch: { type: string }
        archived: { type: boolean }
        stars: { type: integer }
        forks: { type: integer }
        openIssues: { type: integer }
        lastPushAt: { type: string, format: date-time }
        lastReleaseAt: { type: string, format: date-time }
        recentContributors90d: { type: integer }
        contributorConcentration: { type: number }
        pullRequestMedianResponseDays: { type: number }
        pullRequestMedianMergeDays: { type: number }
        issueResolutionMedianDays: { type: number }
        staleIssueShare: { type: number }
    RiskProfile:
      type: object
      required: [inactivityRiskScore, maintenanceOutlook12mScore, securityPostureScore, confidenceScore, riskBucket, actionLevel, caveats, missingSignals, explanationFactors, evidence]
      properties:
        inactivityRiskScore: { type: number }
        maintenanceOutlook12mScore: { type: number }
        securityPostureScore: { type: number }
        confidenceScore: { type: number }
        riskBucket:
          type: string
          enum: [low, medium, high, critical]
        actionLevel:
          type: string
          enum: [monitor, review, replace_candidate]
        scoringMethod: { type: string }
        scoringModel: { type: string }
        modelResults:
          type: array
          items:
            type: object
            additionalProperties: true
        caveats:
          type: array
          items: { type: string }
        missingSignals:
          type: array
          items: { type: string }
        explanationFactors:
          type: array
          items:
            $ref: "#/components/schemas/ExplanationFactor"
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/EvidenceItem"
    ExplanationFactor:
      type: object
      required: [label, direction, weight, detail]
      properties:
        label: { type: string }
        direction:
          type: string
          enum: [increase, decrease, neutral]
        weight: { type: number }
        detail: { type: string }
    EvidenceItem:
      type: object
      required: [source, signal, value, observedAt]
      properties:
        source: { type: string }
        signal: { type: string }
        value: { type: string }
        observedAt: { type: string, format: date-time }
        provenanceUrl: { type: string, format: uri }
    RawSignalItem:
      type: object
      required: [key, value, source]
      properties:
        key: { type: string }
        value: {}
        source: { type: string }
        observedAt: { type: string, format: date-time }
    Job:
      type: object
      required: [id, analysisId, type, status, createdAt, updatedAt, message]
      properties:
        id: { type: string }
        analysisId: { type: string }
        type: { type: string }
        status:
          type: string
          enum: [pending, running, completed, failed]
        attempts: { type: integer }
        maxAttempts: { type: integer }
        lastError: { type: string }
        nextRunAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        message: { type: string }
    JobResponse:
      type: object
      required: [job]
      properties:
        job:
          $ref: "#/components/schemas/Job"
    TrainingDatasetResponse:
      type: object
      required: [dataset]
      properties:
        dataset:
          type: object
          additionalProperties: true
    TrainingEffectsResponse:
      type: object
      required: [effects, labeledSnapshots, activeCount, inactiveCount, datasetHash]
      properties:
        effects:
          type: array
          items:
            $ref: "#/components/schemas/TrainingEffectMetric"
        labeledSnapshots:
          type: integer
        activeCount:
          type: integer
        inactiveCount:
          type: integer
        datasetHash:
          type: string
    TrainingEffectMetric:
      type: object
      required:
        - key
        - label
        - effectSize
        - strength
        - direction
        - activeMedian
        - inactiveMedian
        - activeCount
        - inactiveCount
        - features
      properties:
        key:
          type: string
        label:
          type: string
        effectSize:
          type: number
        strength:
          type: string
        direction:
          type: string
        activeMedian:
          type: number
        inactiveMedian:
          type: number
        activeCount:
          type: integer
        inactiveCount:
          type: integer
        features:
          type: array
          items:
            type: string
        xgboostImportance:
          type: number
        logisticCoefficient:
          type: number
        ignored:
          type: boolean
        note:
          type: string
    TrainingRunListResponse:
      type: object
      required: [runs]
      properties:
        runs:
          type: array
          items:
            type: object
            additionalProperties: true
    LatestTrainingRunResponse:
      type: object
      properties:
        run:
          type: object
          additionalProperties: true
