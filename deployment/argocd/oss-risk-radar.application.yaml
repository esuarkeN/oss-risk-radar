apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oss-risk-radar
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/oss-risk-radar.git
    targetRevision: main
    path: deployment/k8s/base
  destination:
    server: https://kubernetes.default.svc
    namespace: oss-risk-radar
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
