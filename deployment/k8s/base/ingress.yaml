apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: oss-risk-radar
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - radar.example.com
      secretName: oss-risk-radar-tls
  rules:
    - host: radar.example.com
      http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  name: http
