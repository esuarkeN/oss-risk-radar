apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: oss-risk-radar
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-gamedivers
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - oss-risk-radar.gamedivers.de
      secretName: oss-risk-radar-tls
  rules:
    - host: oss-risk-radar.gamedivers.de
      http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  name: http
