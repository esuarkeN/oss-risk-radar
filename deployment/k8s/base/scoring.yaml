apiVersion: v1
kind: Service
metadata:
  name: scoring
  labels:
    app.kubernetes.io/name: scoring
    app.kubernetes.io/part-of: oss-risk-radar
spec:
  ports:
    - name: http
      port: 8090
      targetPort: http
  selector:
    app.kubernetes.io/name: scoring
    app.kubernetes.io/part-of: oss-risk-radar
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scoring
  labels:
    app.kubernetes.io/name: scoring
    app.kubernetes.io/part-of: oss-risk-radar
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scoring
      app.kubernetes.io/part-of: oss-risk-radar
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scoring
        app.kubernetes.io/part-of: oss-risk-radar
    spec:
      containers:
        - name: scoring
          image: ghcr.io/esuarken/oss-risk-radar-scoring:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8090
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
