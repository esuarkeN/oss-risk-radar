name: Build & Deploy (Argo CD)

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "deployment/k8s/**"
      - "deployment/argocd/**"
      - "docs/**"
      - "tex/**"
      - "**/*.md"
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          lfs: true

      - name: Normalize image names
        id: images
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "api=ghcr.io/${owner}/oss-risk-radar-api" >> "$GITHUB_OUTPUT"
          echo "scoring=ghcr.io/${owner}/oss-risk-radar-scoring" >> "$GITHUB_OUTPUT"
          echo "web=ghcr.io/${owner}/oss-risk-radar-web" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.11.1

      - name: Log in to GHCR
        uses: docker/login-action@v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          file: deployment/docker/api.Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.api }}:${{ github.sha }}
            ${{ steps.images.outputs.api }}:latest

      - name: Build & push scoring image
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          file: deployment/docker/scoring.Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.scoring }}:${{ github.sha }}
            ${{ steps.images.outputs.scoring }}:latest

      - name: Build & push web image
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          file: deployment/docker/web.Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.web }}:${{ github.sha }}
            ${{ steps.images.outputs.web }}:latest

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2.1.0

      - name: Update image tags in Kustomize
        shell: bash
        run: |
          cd deployment/k8s/base
          kustomize edit set image ghcr.io/esuarken/oss-risk-radar-api=${{ steps.images.outputs.api }}:${GITHUB_SHA}
          kustomize edit set image ghcr.io/esuarken/oss-risk-radar-scoring=${{ steps.images.outputs.scoring }}:${GITHUB_SHA}
          kustomize edit set image ghcr.io/esuarken/oss-risk-radar-web=${{ steps.images.outputs.web }}:${GITHUB_SHA}

      - name: Commit deploy image tags
        shell: bash
        run: |
          if git diff --quiet -- deployment/k8s/base/kustomization.yaml; then
            echo "Kustomize image tags already point at ${GITHUB_SHA}."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deployment/k8s/base/kustomization.yaml
          git commit -m "chore(deploy): bump images to ${GITHUB_SHA} [skip ci]"
          git push origin HEAD:main
