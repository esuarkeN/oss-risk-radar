name: ML Artifacts

on:
  workflow_dispatch:
    inputs:
      snapshots_path:
        description: "Path to an existing labeled snapshots.json file"
        required: true
        default: "deployment/training/snapshots.json"
      force:
        description: "Retrain even if matching artifacts already exist"
        required: true
        type: boolean
        default: true
      minimum_repositories:
        description: "Minimum real repositories required before staging"
        required: true
        default: "40"
      minimum_inactive_repositories:
        description: "Minimum inactive repositories required before staging"
        required: true
        default: "8"

permissions:
  contents: write
  pull-requests: write

jobs:
  train-stage-and-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Install notebook dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -c mltraining/scoring/constraints-py314.txt "./mltraining/scoring[notebook]"

      - name: Prepare training input
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f "${{ inputs.snapshots_path }}" ]]; then
            echo "Snapshots file not found: ${{ inputs.snapshots_path }}" >&2
            exit 1
          fi
          mkdir -p tmp/training/runs
          cp "${{ inputs.snapshots_path }}" tmp/training/snapshots.json
          cache_path="$(dirname "${{ inputs.snapshots_path }}")/repository-feature-cache.json"
          if [[ -f "${cache_path}" ]]; then
            cp "${cache_path}" tmp/training/repository-feature-cache.json
          fi

      - name: Execute training notebook
        shell: bash
        env:
          FORCE_ARTIFACTS: ${{ inputs.force }}
        run: |
          set -euo pipefail
          force_flag=()
          if [[ "${FORCE_ARTIFACTS}" == "true" ]]; then
            force_flag=(--force)
          fi
          npm run ml:train:ci -- -- \
            --dataset-path tmp/training/snapshots.json \
            --runs-dir tmp/training/runs \
            --latest-run-path tmp/training/latest-run.json \
            "${force_flag[@]}"

      - name: Stage deployable model artifacts
        run: |
          npm run ml:stage-training -- -- \
            --minimum-repositories "${{ inputs.minimum_repositories }}" \
            --minimum-inactive-repositories "${{ inputs.minimum_inactive_repositories }}" \
            --summary-output tmp/training/pipeline-summary.json

      - name: Prepare pull request metadata
        id: pr
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("node:fs");
          const summary = JSON.parse(fs.readFileSync("tmp/training/pipeline-summary.json", "utf8"));
          const hash = summary.dataset.hash ?? "unknown-dataset";
          const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
          const metric = (value) => value === null || value === undefined ? "n/a" : Number(value).toFixed(4);
          const models = summary.models.map((model) => {
            const metrics = model.metrics ?? {};
            return `| ${model.modelName} | ${model.modelVersion ?? "n/a"} | ${metric(metrics.rocAuc)} | ${metric(metrics.brierScore)} | ${metric(metrics.qualityScore)} |`;
          }).join("\n");
          const body = `## Model Artifact Promotion

          This PR stages model artifacts generated by the notebook-primary training runbook.

          - Dataset hash: \`${hash}\`
          - Snapshots: ${summary.dataset.totalSnapshots}
          - Labeled snapshots: ${summary.dataset.labeledSnapshots}
          - Real repositories: ${summary.dataset.repositories}
          - Inactive repositories: ${summary.dataset.inactiveRepositories}
          - Workflow artifact: ${runUrl}

          | Model | Version | AUROC | Brier | Quality |
          | --- | --- | ---: | ---: | ---: |
          ${models}

          Staged paths:
          - \`${summary.dataset.stagedPath}\`
          - \`${summary.staged.featureCachePath ?? "repository feature cache not staged"}\`
          - \`${summary.staged.latestRunPath}\`
          - \`${summary.staged.runsDir}\`
          `;
          fs.writeFileSync("tmp/training/pr-body.md", body.replace(/^          /gm, "").trim() + "\n");
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `dataset_hash_prefix=${hash.slice(0, 12)}\n`);
          NODE

      - name: Detect staged artifact changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet -- deployment/training; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload model artifact bundle
        uses: actions/upload-artifact@v7.0.1
        with:
          name: oss-risk-radar-model-artifacts-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: error
          path: |
            tmp/training/snapshots.json
            tmp/training/repository-feature-cache.json
            tmp/training/latest-run.json
            tmp/training/runs/*.json
            tmp/notebooks/*.executed.ipynb
            tmp/training/pipeline-summary.json
            deployment/training/**

      - name: Open artifact promotion PR
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: automation/model-artifacts-${{ github.run_id }}
          delete-branch: true
          add-paths: deployment/training
          commit-message: "chore(ml): stage model artifacts for ${{ steps.pr.outputs.dataset_hash_prefix }}"
          title: "chore(ml): stage model artifacts for ${{ steps.pr.outputs.dataset_hash_prefix }}"
          body-path: tmp/training/pr-body.md
